<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestionnaire de Tâches</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="data:,">
  </head>

  <body>
    <header>
      <h1>Gestionnaire de Tâches</h1>
    </header>

    <main>
      <!-- FORMULAIRE -->
      <section class="form-section">
        <h2 id ="form-title">Ajouter une tâche</h2>

        <form id="task-form" class="task-form">
          <div class="form-group">
            <label for="title">Titre</label>
            <input
              type="text"
              id="title"
              required
              minlength="3"
              maxlength="50"
            />
          <small class="error-message" id="title-error"></small>
          </div>

          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" maxlength="200"></textarea>
            <small class="error-message" id="description-error"></small>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="category">Catégorie</label>
              <select id="category">
                <option value="work">Travail</option>
                <option value="personal">Personnel</option>
                <option value="urgent">Urgent</option>
              </select>
            </div>

            <div class="form-group">
              <label for="priority">Priorité</label>
              <select id="priority">
                <option value="low">Basse</option>
                <option value="medium">Moyenne</option>
                <option value="high">Haute</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="dueDate">Date</label>
              <input type="date" id="dueDate" />
            </div>
             <div class="form-actions">
              <button type="submit" class="submit-btn">Ajouter</button>
              <button type="button" id="cancel-edit-btn" class="cancel-btn">Annuler</button>
             </div>
          </div>
        </form>
      </section>

      <!-- RECHERCHE -->
      <section class="search-section">
        <input type="text" id="search" placeholder="Recherche une tâche..." />
      </section>

      <!-- FILTRES -->
      <section class="filters-section">
        <div class="filters">
          <button class="filter-btn active" data-filter="all">Toutes</button>
          <button class="filter-btn" data-filter="work">Travail</button>
          <button class="filter-btn" data-filter="urgent">Urgent</button>
          <button class="filter-btn" data-filter="completed">Complétées</button>
          <button class="filter-btn" data-filter="personal">Personnel</button>
          <button class="filter-btn" data-filter="pending">En cours</button>
        </div>
      </section>

      <!-- LISTE -->
      <section class="tasks-section">
        <ul id="task-list" class="task-list">
          <!-- EXEMPLE DE TÂCHE -->
          <li class="task">
            <div class="task-main">
              <input type="checkbox" class="task-checkbox" />

              <div class="task-content">
                <h3 class="task-title">Acheter un clavier</h3>

                <div class="task-meta">
                  <span class="task-category work">Travail</span>
                  <span class="task-priority high">▲ Haute</span>
                  <span class="task-date">12/05/2026</span>
                </div>
              </div>

              <div class="task-actions">
                <button class="edit-btn">✏️</button>
                <button class="delete-btn">🗑️</button>
              </div>
            </div>

            <div class="task-description">
              Acheter un clavier mécanique pour améliorer la productivité.
            </div>
          </li>
        </ul>
      </section>

      <!-- STATS -->
      <section class="stats-section">
        <div class="stats">
          <div class="stat">
            <span id="total-tasks">1</span>
            <p>Total</p>
          </div>
          <div class="stat">
            <span id="completed-tasks">0</span>
            <p>Complétées</p>
          </div>
          <div class="stat">
            <span id="pending-tasks">1</span>
            <p>En cours</p>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 - Projet To-Do</p>
    </footer>

    <script type="module" src="js/01-main.js"></script>
    <script type="module" src="js/02-Task.js"></script>
    <script type="module" src="js/03-TaskManager.js"></script>
    <script type="module" src="js/04-UI.js"></script>
    <script type="module" src="js/05-Storage.js"></script>
    <script type="module" src="js/06-utils.js"></script>
  </body>
</html>
